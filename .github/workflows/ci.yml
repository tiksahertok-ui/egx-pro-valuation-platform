name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/egx_pro_ci"
      NEXTAUTH_SECRET: "ci-test-secret-do-not-use-in-production"
      ADMIN_EMAIL: "ci@test.com"
      ADMIN_PASSWORD: "ci-test-password"
      CRON_SECRET: "ci-cron-secret"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build
