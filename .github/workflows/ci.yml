name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: egxpro
          POSTGRES_PASSWORD: egxpro123
          POSTGRES_DB: egxpro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Run lint
        run: bun run lint

      - name: Run tests
        run: bun run test
        env:
          DATABASE_URL: postgresql://egxpro:egxpro123@localhost:5432/egxpro_test?schema=public
          NEXTAUTH_SECRET: test-secret-key-for-ci
          ADMIN_EMAIL: test@egxpro.com
          ADMIN_PASSWORD: testpassword
          CRON_SECRET: test-cron-secret

      - name: Run tests with coverage
        run: bun run test:coverage
        env:
          DATABASE_URL: postgresql://egxpro:egxpro123@localhost:5432/egxpro_test?schema=public
          NEXTAUTH_SECRET: test-secret-key-for-ci
          ADMIN_EMAIL: test@egxpro.com
          ADMIN_PASSWORD: testpassword
          CRON_SECRET: test-cron-secret

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
